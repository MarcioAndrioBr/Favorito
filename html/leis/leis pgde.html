<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Leis do Brasil</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
margin-top:8px;
font-size:16px;
border:none;
background:#e41313;
color:white;
cursor:pointer;

text-align:left;
padding-left:5rem;

}

button:hover{
background:#1a5bbf;
}

</style>

<script>
function pesquisar(){

let filtro = document.getElementById("pesquisa").value.toLowerCase();
let leis = document.querySelectorAll(".lei");

leis.forEach(function(lei){

let texto = lei.innerText.toLowerCase();

if(texto.includes(filtro)){
lei.style.display="block";
}else{
lei.style.display="none";
}

});

}
</script>

</head>

<body>

    <div class="container">

        <h1>Leis PGDE</h1>

        <input type="text" id="pesquisa" onkeyup="pesquisar()" placeholder="Pesquisar lei...">
